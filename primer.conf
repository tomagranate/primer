# primer.conf
# Each [section] activates a module. Remove a section to disable it.
# Indented lines continue the previous key's value.

[xcode]
label = Xcode CLT

[homebrew]
label = Homebrew
depends_on = xcode
taps =
    tomagranate/tap
formulae =
    mise
    starship
    fzf
    ripgrep
    fd
    bat
    jq
    mas
    colima
    duf
    dust
    eza
    htop
    neovim
    netcat
    opencode
    corsa

[homebrew-apps]
label = Mac Apps
depends_on = homebrew
casks =
    google-chrome
    spotify
    messenger
    bluesnooze
    ghostty
    logi-options+
    cursor

[mac-app-store]
label = App Store
depends_on = homebrew
mas =
    Tailscale:1475387142

[zsh]
label = Zsh + Zim
depends_on = homebrew

[starship]
label = Starship prompt
depends_on = homebrew

[mise]
label = Mise languages
depends_on = homebrew
tools =
    node:lts
    python:3.12
    bun:latest

[touchid]
label = Touch ID

[git]
label = Git extensions

[ghostty]
label = Ghostty terminal
